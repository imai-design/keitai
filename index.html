<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="コックピット">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>携帯コックピット</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DotGothic16',sans-serif;background:#0b0e16;color:#e6e9f5;
       min-height:100dvh;display:flex;flex-direction:column;align-items:center;
       justify-content:center;gap:20px;padding:28px;
       background-image:radial-gradient(circle at 20% 10%,#1a2240 0,transparent 45%),
                        radial-gradient(circle at 85% 90%,#2a1a40 0,transparent 45%)}
  h1{font-size:21px;letter-spacing:1px;color:#fff;text-shadow:0 2px 0 #000}
  .sub{font-size:12px;color:#8b93b8;margin-top:-10px}
  a.btn,button.btn{width:100%;max-width:420px;display:flex;align-items:center;gap:16px;
        text-decoration:none;color:#fff;padding:22px 24px;border-radius:18px;
        border:2px solid #2b355f;background:#141a2e;font-family:inherit;cursor:pointer;
        box-shadow:0 6px 0 #0a0d18,0 10px 24px rgba(0,0,0,.5);transition:transform .08s ease}
  a.btn:active,button.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #0a0d18}
  a.term{border-color:#7c8cff;background:#1a2350}
  .ico{font-size:30px;line-height:1}
  .txt{text-align:left}.txt b{font-size:18px;display:block}.txt span{font-size:12px;color:#9aa3cc}
  #status{font-size:12px;color:#8b93b8;min-height:18px;text-align:center}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .on{background:#46d18a;box-shadow:0 0 8px #46d18a}.off{background:#ff5d6c;box-shadow:0 0 8px #ff5d6c}
  .warn{font-size:13px;color:#ffd479;text-align:center;line-height:1.7;max-width:420px;display:none}
  .foot{font-size:11px;color:#5a6188;margin-top:6px;text-align:center;line-height:1.6}
  #links{display:flex;flex-direction:column;gap:16px;width:100%;align-items:center;opacity:.4;pointer-events:none}
  #links.ready{opacity:1;pointer-events:auto}
</style>
</head>
<body>
  <h1>携帯コックピット</h1>
  <div class="sub">スマホから自宅Macを動かす入口</div>
  <div id="status"><span class="dot off"></span>接続を確認中…</div>

  <div id="links">
    <a class="btn term" id="lk-term" href="#"><span class="ico">▶</span>
      <span class="txt"><b>Claude Code を動かす</b><span>ターミナルが開く・指示を打つだけ</span></span></a>
    <a class="btn" id="lk-board" href="#"><span class="ico">■</span>
      <span class="txt"><b>やることボード</b><span>全プロジェクトを4象限で一望</span></span></a>
    <a class="btn" id="lk-space" href="#"><span class="ico">✦</span>
      <span class="txt"><b>宇宙マップ</b><span>今動くエージェントを実況</span></span></a>
  </div>

  <div class="warn" id="warn">
    Macのゲートウェイが見つかりません。<br>
    自宅Macで <b>keitai</b> を起動してから、もう一度開いてください。
  </div>
  <div class="foot">このアイコンは固定です。<br>Mac側のURLが変わっても自動で今の入口へつなぎます。</div>

<script>
// 鍵は #k=... で渡る（URLフラグメントはサーバーに送信されず、公開リポジトリにも残らない）。
// 一度開けば localStorage に保存し、以降フラグメント無しでも動く。
(function(){
  const KEY_STORE = "keitai_key";
  const params = new URLSearchParams(location.hash.slice(1));
  let key = params.get("k");
  if (key) { try{ localStorage.setItem(KEY_STORE, key); }catch(e){} history.replaceState(null,"",location.pathname); }
  else { try{ key = localStorage.getItem(KEY_STORE) || ""; }catch(e){ key=""; } }

  const statusEl = document.getElementById("status");
  const linksEl  = document.getElementById("links");
  const warnEl   = document.getElementById("warn");

  function setLinks(base){
    const q = key ? ("?key="+encodeURIComponent(key)) : "";
    document.getElementById("lk-term").href  = base + "/t/" + q;
    document.getElementById("lk-board").href = base + "/" + q;
    document.getElementById("lk-space").href = base + "/space.html" + q;
  }

  fetch("live.json?t=" + Date.now(), {cache:"no-store"})
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => {
      if (!d.base) throw 0;
      setLinks(d.base);
      linksEl.classList.add("ready");
      const upd = d.updated ? ("  (更新 "+d.updated+")") : "";
      statusEl.innerHTML = '<span class="dot on"></span>Mac 稼働中' + upd;
      if (!key) {
        statusEl.innerHTML += '<br><span style="color:#ffd479">初回は Obsidian「携帯アクセス」のリンクから開いて鍵を保存してください</span>';
      }
    })
    .catch(() => {
      statusEl.innerHTML = '<span class="dot off"></span>未接続';
      warnEl.style.display = "block";
    });
})();
</script>
</body>
</html>
